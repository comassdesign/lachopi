function MerKavo() {
  const [selected, setSelected] = useState(() => { try { return JSON.parse(safeStorage.get('selected') || '{}'); } catch { return {}; } });
  const [purchased, setPurchased] = useState(() => { try { return JSON.parse(safeStorage.get('purchased') || '{}'); } catch { return {}; } });
  const [activeCategory, setActiveCategory] = useState('frutas');
  const [activeSubcategory, setActiveSubcategory] = useState('frutas');
  const [view, setView] = useState('catalog');
  const [animating, setAnimating] = useState(null);
  const [dark, setDark] = useState(() => { try { return JSON.parse(safeStorage.get('dark') || 'false'); } catch { return false; } });
  const [language, setLanguage] = useState(() => { try { return JSON.parse(safeStorage.get('language') || '"es"'); } catch { return 'es'; } });
  const [searchQuery, setSearchQuery] = useState('');
  const [customProducts, setCustomProducts] = useState(() => { try { return JSON.parse(safeStorage.get('customProducts') || '[]'); } catch { return []; } });
  const [showAddModal, setShowAddModal] = useState(false);
  const [newName, setNewName] = useState('');
  const [newEmoji, setNewEmoji] = useState('⭐');

  useEffect(() => { safeStorage.set('selected', JSON.stringify(selected)); }, [selected]);
  useEffect(() => { safeStorage.set('purchased', JSON.stringify(purchased)); }, [purchased]);
  useEffect(() => { safeStorage.set('dark', JSON.stringify(dark)); }, [dark]);
  useEffect(() => { safeStorage.set('language', JSON.stringify(language)); }, [language]);
  useEffect(() => { safeStorage.set('customProducts', JSON.stringify(customProducts)); }, [customProducts]);

  const t = (key) => UI[key]?.[language] || UI[key]?.es || key;
  const getName = (obj) => typeof obj === 'string' ? obj : (obj?.[language] || obj?.es || '');

  const allCategories = useMemo(() => {
    const customCat = {
      name: UI.myProducts, emoji: '⭐',
      gradient: 'from-yellow-100 via-amber-100 to-orange-100',
      gradientDark: 'from-yellow-500/25 via-amber-500/20 to-orange-500/25',
      isCustom: true,
      subcategories: { personal: { name: UI.myProducts, emoji: '⭐', items: customProducts } }
    };
    return { ...CATEGORIES, mis_productos: customCat };
  }, [customProducts]);

  const allItems = useMemo(() => {
    const items = [];
    Object.entries(allCategories).forEach(([catKey, cat]) => {
      Object.entries(cat.subcategories).forEach(([subKey, sub]) => {
        sub.items.forEach(item => items.push({ ...item, catKey, subKey, cat, sub }));
      });
    });
    return items;
  }, [allCategories]);

  const filteredItems = useMemo(() => {
    if (!searchQuery.trim()) return null;
    const q = searchQuery.toLowerCase().trim();
    return allItems.filter(item => getName(item.name).toLowerCase().includes(q));
  }, [searchQuery, allItems, language]);

  const changeCategory = (key) => {
    setActiveCategory(key);
    setActiveSubcategory(Object.keys(allCategories[key].subcategories)[0]);
    setSearchQuery('');
  };

  const toggleItem = (id) => {
    setAnimating(id);
    setTimeout(() => setAnimating(null), 400);
    setSelected(p => { const n = {...p}; n[id] ? delete n[id] : n[id] = true; return n; });
  };
  const togglePurchased = (id) => setPurchased(p => { const n = {...p}; n[id] ? delete n[id] : n[id] = true; return n; });
  const removeFromList = (id) => {
    setSelected(p => { const n = {...p}; delete n[id]; return n; });
    setPurchased(p => { const n = {...p}; delete n[id]; return n; });
  };
  const clearList = () => { setSelected({}); setPurchased({}); };

  const addCustomProduct = () => {
    const name = newName.trim();
    if (!name) return;
    const id = `custom-${Date.now()}`;
    setCustomProducts(p => [...p, { id, name, emoji: newEmoji || '⭐' }]);
    setNewName(''); setNewEmoji('⭐'); setShowAddModal(false);
  };

  const deleteCustomProduct = (id) => {
    setCustomProducts(p => p.filter(x => x.id !== id));
    setSelected(p => { const n = {...p}; delete n[id]; return n; });
    setPurchased(p => { const n = {...p}; delete n[id]; return n; });
  };

  const totalSelected = Object.keys(selected).length;
  const totalPurchased = Object.keys(purchased).filter(id => selected[id]).length;
  const countCategorySelected = (cat) => Object.values(cat.subcategories).reduce((acc, sub) => acc + sub.items.filter(item => selected[item.id]).length, 0);
  const countSubSelected = (sub) => sub.items.filter(item => selected[item.id]).length;

  const selectedItemsByCategory = Object.entries(allCategories).map(([catKey, cat]) => {
    const items = [];
    Object.values(cat.subcategories).forEach(sub => sub.items.forEach(item => { if (selected[item.id]) items.push(item); }));
    return { catKey, cat, items };
  }).filter(g => g.items.length > 0);

  const currentCategory = allCategories[activeCategory];
  const currentSub = currentCategory.subcategories[activeSubcategory] || Object.values(currentCategory.subcategories)[0];

  const bgMain = dark ? 'bg-slate-950' : 'bg-gradient-to-br from-green-50 via-yellow-50 to-orange-50';
  const headerBg = dark ? 'bg-slate-900/80 border-slate-800' : 'bg-white/70 border-white/50';
  const cardBg = dark ? 'bg-slate-800/70' : 'bg-white/70';
  const tabInactive = dark ? 'bg-slate-800/70 text-slate-300 hover:bg-slate-700 border-slate-700/50' : 'bg-white/60 text-gray-600 hover:bg-white border-transparent';
  const itemBg = dark ? 'bg-slate-800/80 hover:bg-slate-700/80 border-slate-700/50' : 'bg-white/70 hover:bg-white border-transparent';
  const itemSelectedBg = dark ? 'bg-slate-700 ring-2 ring-emerald-400' : 'bg-white ring-2 ring-green-300';
  const itemNameText = dark ? 'text-slate-200' : 'text-gray-600';
  const itemNameSelectedText = dark ? 'text-white' : 'text-gray-700';
  const headingText = dark ? 'text-slate-100' : 'text-gray-700';
  const subText = dark ? 'text-slate-400' : 'text-gray-500';
  const listItemBg = dark ? 'bg-slate-800/90' : 'bg-white/80';
  const inputBg = dark ? 'bg-slate-800 border-slate-700 text-slate-100 placeholder-slate-500' : 'bg-white border-gray-200 text-gray-700 placeholder-gray-400';

  const renderProduct = (item, options = {}) => {
    const { showCategoryBadge = false, allowDelete = false } = options;
    const isSelected = selected[item.id];
    const itemName = getName(item.name);
    return (
      <button key={item.id} onClick={() => toggleItem(item.id)} className={`relative group p-4 rounded-2xl transition-all duration-200 border text-left ${isSelected ? `${itemSelectedBg} shadow-md scale-95` : `${itemBg} hover:shadow-sm hover:-translate-y-0.5`} ${animating === item.id ? 'pop' : ''}`}>
        {isSelected && (<div className="absolute top-2 right-2 w-5 h-5 rounded-full bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center shadow-sm"><Check size={12} className="text-white" strokeWidth={3} /></div>)}
        {allowDelete && (<span onClick={(e) => { e.stopPropagation(); deleteCustomProduct(item.id); }} className={`absolute top-2 left-2 w-5 h-5 rounded-full ${dark ? 'bg-slate-900/80 text-rose-400' : 'bg-white/80 text-rose-400'} flex items-center justify-center shadow-sm hover:bg-rose-500 hover:text-white cursor-pointer transition-colors`}><X size={12} strokeWidth={3} /></span>)}
        <div className="text-3xl mb-1">{item.emoji}</div>
        <div className={`text-xs font-medium ${isSelected ? itemNameSelectedText : itemNameText}`}>{itemName}</div>
        {showCategoryBadge && item.cat && (<div className={`text-[10px] mt-1 ${subText} flex items-center gap-1`}><span>{item.cat.emoji}</span><span>{getName(item.cat.name)}</span></div>)}
      </button>
    );
  };

  return (
    <div className={`min-h-screen ${bgMain} pb-24 transition-colors duration-300 relative`}>
      {dark && (<>
        <div className="fixed top-0 left-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none" />
        <div className="fixed bottom-0 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl pointer-events-none" />
      </>)}

      <header className={`sticky top-0 z-20 backdrop-blur-xl ${headerBg} border-b transition-colors duration-300`}>
        <div className="max-w-3xl mx-auto px-5 py-4 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3 min-w-0">
            <Logo size={44} />
            <div className="min-w-0">
              <h1 className="text-2xl font-bold bg-gradient-to-r from-green-400 via-emerald-400 to-lime-400 bg-clip-text text-transparent leading-none">merkavo</h1>
            </div>
          </div>
          <div className="flex gap-1.5 items-center flex-shrink-0">
            <button onClick={() => setView('catalog')} className={`p-2.5 rounded-full transition-all ${view === 'catalog' ? 'bg-gradient-to-r from-green-400 to-emerald-400 text-white shadow-md' : `${tabInactive} border`}`}>
              <Search size={18} />
            </button>
            <button onClick={() => setView('list')} className={`p-2.5 rounded-full transition-all relative ${view === 'list' ? 'bg-gradient-to-r from-rose-400 to-pink-400 text-white shadow-md' : `${tabInactive} border`}`}>
              <ShoppingCart size={18} />
              {totalSelected > 0 && (<span className={`absolute -top-1 -right-1 ${view === 'list' ? 'bg-white text-rose-500' : 'bg-rose-400 text-white'} text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center shadow-sm`}>{totalSelected}</span>)}
            </button>
            <button onClick={() => setView('settings')} className={`p-2.5 rounded-full transition-all ${view === 'settings' ? 'bg-gradient-to-r from-purple-400 to-violet-400 text-white shadow-md' : `${tabInactive} border`}`}>
              <Settings size={18} />
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-5 pt-6 relative z-10">
        {view === 'catalog' && (
          <div className="slide-up">
            <div className={`relative mb-5 ${cardBg} backdrop-blur rounded-2xl border ${dark ? 'border-slate-700/60' : 'border-white/60'} shadow-sm`}>
              <Search size={18} className={`absolute left-4 top-1/2 -translate-y-1/2 ${subText}`} />
              <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder={t('searchPlaceholder')} className={`w-full pl-11 pr-11 py-3 rounded-2xl bg-transparent ${dark ? 'text-slate-100 placeholder-slate-500' : 'text-gray-700 placeholder-gray-400'} outline-none text-sm`} />
              {searchQuery && (<button onClick={() => setSearchQuery('')} className={`absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-full ${dark ? 'hover:bg-slate-700 text-slate-400' : 'hover:bg-gray-100 text-gray-400'}`}><X size={16} /></button>)}
            </div>

            {filteredItems !== null ? (
              <div className="fade-in">
                {filteredItems.length === 0 ? (
                  <div className={`text-center py-16 ${cardBg} rounded-3xl border ${dark ? 'border-slate-700/60' : 'border-white/60'}`}>
                    <div className="text-5xl mb-3">🔍</div>
                    <p className={`${headingText} font-medium`}>{t('noResults')}</p>
                  </div>
                ) : (
                  <>
                    <div className={`text-xs ${subText} mb-3 px-1`}>{filteredItems.length} ✨</div>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                      {filteredItems.map(item => renderProduct(item, { showCategoryBadge: true }))}
                    </div>
                  </>
                )}
              </div>
            ) : (
              <>
                <div className="flex flex-wrap gap-2 mb-5">
                  {Object.entries(allCategories).map(([key, cat]) => {
                    const count = countCategorySelected(cat);
                    const isActive = activeCategory === key;
                    const gradient = dark ? cat.gradientDark : cat.gradient;
                    return (
                      <button key={key} onClick={() => changeCategory(key)} className={`relative px-3.5 py-2 rounded-2xl text-xs font-medium transition-all flex items-center gap-1.5 border ${isActive ? `bg-gradient-to-br ${gradient} ${dark ? 'text-slate-100 border-slate-600 shadow-lg shadow-black/20' : 'text-gray-800 border-white shadow-md'} scale-105` : tabInactive}`}>
                        <span className="text-sm">{cat.emoji}</span>{getName(cat.name)}
                        {count > 0 && (<span className="ml-1 bg-gradient-to-br from-green-400 to-emerald-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1">{count}</span>)}
                      </button>
                    );
                  })}
                </div>

                <div className={`bg-gradient-to-br ${dark ? currentCategory.gradientDark : currentCategory.gradient} rounded-3xl p-5 shadow-sm border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/30' : 'border-white/60'}`}>
                  <h2 className={`text-lg font-bold ${headingText} mb-4 flex items-center gap-2`}>
                    <span className="text-2xl">{currentCategory.emoji}</span>{getName(currentCategory.name)}
                  </h2>

                  {currentCategory.isCustom ? (
                    <>
                      {customProducts.length === 0 ? (
                        <div className={`text-center py-12 ${dark ? 'bg-slate-900/40' : 'bg-white/40'} rounded-2xl`}>
                          <div className="text-5xl mb-3">⭐</div>
                          <p className={`${headingText} font-medium mb-1`}>{t('noCustom')}</p>
                          <p className={`${subText} text-sm`}>{t('createFirst')}</p>
                        </div>
                      ) : (
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                          {customProducts.map(item => renderProduct(item, { allowDelete: true }))}
                        </div>
                      )}
                      <div className="mt-4 flex justify-center">
                        <button onClick={() => setShowAddModal(true)} className="px-5 py-3 bg-gradient-to-r from-amber-400 to-orange-400 text-white rounded-full font-medium shadow-md hover:shadow-lg transition-all flex items-center gap-2">
                          <Plus size={18} /> {t('addProduct')}
                        </button>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="flex flex-wrap gap-1.5 mb-5">
                        {Object.entries(currentCategory.subcategories).map(([subKey, sub]) => {
                          const isActive = activeSubcategory === subKey;
                          const subCount = countSubSelected(sub);
                          return (
                            <button key={subKey} onClick={() => setActiveSubcategory(subKey)} className={`px-3 py-1.5 rounded-xl text-xs font-medium transition-all flex items-center gap-1 ${isActive ? (dark ? 'bg-slate-900/80 text-white shadow-md' : 'bg-white text-gray-800 shadow-md') : (dark ? 'bg-slate-900/40 text-slate-300 hover:bg-slate-900/60' : 'bg-white/50 text-gray-600 hover:bg-white/80')}`}>
                              <span>{sub.emoji}</span>{getName(sub.name)}
                              {subCount > 0 && (<span className="ml-0.5 bg-gradient-to-br from-green-400 to-emerald-500 text-white text-[9px] font-bold rounded-full min-w-[16px] h-[16px] flex items-center justify-center px-1">{subCount}</span>)}
                            </button>
                          );
                        })}
                      </div>

                      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 fade-in" key={activeSubcategory}>
                        {currentSub.items.map(item => renderProduct(item))}
                      </div>
                    </>
                  )}
                </div>
              </>
            )}
          </div>
        )}

        {view === 'list' && (
          <div className="slide-up">
            {totalSelected === 0 ? (
              <div className="text-center py-20">
                <div className={`inline-block p-6 rounded-3xl ${cardBg} mb-4 border ${dark ? 'border-slate-700/60' : 'border-white/60'}`}>
                  <ShoppingCart size={48} className={dark ? 'text-slate-600' : 'text-gray-300'} />
                </div>
                <h3 className={`text-xl font-bold ${headingText} mb-2`}>{t('emptyList')}</h3>
                <p className={`${subText} text-sm mb-6`}>{t('emptyHint')}</p>
                <button onClick={() => setView('catalog')} className="px-6 py-3 bg-gradient-to-r from-green-400 to-emerald-400 text-white rounded-full font-medium shadow-md hover:shadow-lg transition-all flex items-center gap-2 mx-auto">
                  <Plus size={18} /> {t('startAdding')}
                </button>
              </div>
            ) : (
              <>
                <div className={`${cardBg} backdrop-blur rounded-3xl p-5 mb-5 border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/20' : 'border-white/60'} shadow-sm`}>
                  <div className="flex items-center justify-between mb-3">
                    <div>
                      <div className="text-3xl font-bold bg-gradient-to-r from-rose-400 to-pink-400 bg-clip-text text-transparent">{totalSelected - totalPurchased}</div>
                      <div className={`text-xs ${subText}`}>{t('toBuy')}</div>
                    </div>
                    <div className="text-right">
                      <div className="text-3xl font-bold text-emerald-400">{totalPurchased}</div>
                      <div className={`text-xs ${subText}`}>{t('inCart')}</div>
                    </div>
                  </div>
                  <div className={`w-full h-2 ${dark ? 'bg-slate-700' : 'bg-gray-100'} rounded-full overflow-hidden`}>
                    <div className="h-full bg-gradient-to-r from-green-400 to-emerald-400 transition-all duration-500" style={{ width: `${(totalPurchased / totalSelected) * 100}%` }} />
                  </div>
                </div>

                <div className="space-y-4">
                  {selectedItemsByCategory.map(({ catKey, cat, items }) => (
                    <div key={catKey} className={`bg-gradient-to-br ${dark ? cat.gradientDark : cat.gradient} rounded-3xl p-4 border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/20' : 'border-white/60'} shadow-sm fade-in`}>
                      <div className="flex items-center gap-2 mb-3 px-1">
                        <span className="text-xl">{cat.emoji}</span>
                        <h3 className={`font-bold ${headingText} text-sm`}>{getName(cat.name)}</h3>
                        <span className={`text-xs ${subText} ${dark ? 'bg-slate-900/60' : 'bg-white/60'} px-2 py-0.5 rounded-full ml-auto`}>{items.length}</span>
                      </div>
                      <div className="space-y-2">
                        {items.map(item => {
                          const isPurchased = purchased[item.id];
                          return (
                            <div key={item.id} className={`flex items-center gap-3 ${listItemBg} backdrop-blur rounded-2xl p-3 transition-all border ${dark ? 'border-slate-700/40' : 'border-transparent'} ${isPurchased ? 'opacity-50' : ''}`}>
                              <button onClick={() => togglePurchased(item.id)} className={`w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center transition-all ${isPurchased ? 'bg-gradient-to-br from-green-400 to-emerald-500 shadow-sm' : `border-2 ${dark ? 'border-slate-500' : 'border-gray-300'} hover:border-green-400`}`}>
                                {isPurchased && <Check size={14} className="text-white" strokeWidth={3} />}
                              </button>
                              <span className="text-2xl">{item.emoji}</span>
                              <span className={`flex-1 text-sm font-medium ${isPurchased ? `line-through ${dark ? 'text-slate-500' : 'text-gray-400'}` : (dark ? 'text-slate-100' : 'text-gray-700')}`}>{getName(item.name)}</span>
                              <button onClick={() => removeFromList(item.id)} className={`${dark ? 'text-slate-500 hover:text-rose-400' : 'text-gray-300 hover:text-rose-400'} transition-colors p-1`}><Trash2 size={16} /></button>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="mt-6 flex justify-center">
                  <button onClick={clearList} className={`px-5 py-2.5 ${dark ? 'bg-slate-800/80 hover:bg-slate-800 border-rose-900/40 text-rose-400' : 'bg-white/60 hover:bg-white border-rose-100 text-rose-500'} text-sm font-medium rounded-full border transition-all flex items-center gap-2`}>
                    <Trash2 size={14} /> {t('clearList')}
                  </button>
                </div>
              </>
            )}
          </div>
        )}

        {view === 'settings' && (
          <div className="slide-up space-y-5">
            <div className={`${cardBg} backdrop-blur rounded-3xl p-5 border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/20' : 'border-white/60'} shadow-sm`}>
              <h3 className={`font-bold ${headingText} mb-4 flex items-center gap-2`}>
                {dark ? <Moon size={18} /> : <Sun size={18} />} {t('appearance')}
              </h3>
              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => setDark(false)} className={`p-4 rounded-2xl transition-all border-2 ${!dark ? 'bg-gradient-to-br from-yellow-100 to-orange-100 border-amber-400 shadow-md' : `${dark ? 'bg-slate-800 border-slate-700' : 'bg-white border-gray-200'}`}`}>
                  <Sun size={28} className={`mx-auto mb-2 ${!dark ? 'text-amber-500' : (dark ? 'text-slate-500' : 'text-gray-400')}`} />
                  <div className={`text-sm font-medium ${!dark ? 'text-gray-800' : (dark ? 'text-slate-300' : 'text-gray-600')}`}>{t('lightMode')}</div>
                </button>
                <button onClick={() => setDark(true)} className={`p-4 rounded-2xl transition-all border-2 ${dark ? 'bg-gradient-to-br from-slate-800 to-slate-900 border-emerald-400 shadow-md' : 'bg-white border-gray-200'}`}>
                  <Moon size={28} className={`mx-auto mb-2 ${dark ? 'text-emerald-400' : 'text-gray-400'}`} />
                  <div className={`text-sm font-medium ${dark ? 'text-slate-200' : 'text-gray-600'}`}>{t('darkMode')}</div>
                </button>
              </div>
            </div>

            <div className={`${cardBg} backdrop-blur rounded-3xl p-5 border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/20' : 'border-white/60'} shadow-sm`}>
              <h3 className={`font-bold ${headingText} mb-4 flex items-center gap-2`}>
                <Globe size={18} /> {t('language')}
              </h3>
              <div className="grid grid-cols-1 gap-2">
                {LANGS.map(l => (
                  <button key={l.code} onClick={() => setLanguage(l.code)} className={`flex items-center gap-3 p-3 rounded-2xl transition-all border-2 ${language === l.code ? (dark ? 'bg-slate-700 border-emerald-400' : 'bg-gradient-to-r from-green-50 to-emerald-50 border-green-300') : (dark ? 'bg-slate-800/50 border-slate-700/50 hover:bg-slate-800' : 'bg-white/50 border-transparent hover:bg-white')}`}>
                    <span className="text-2xl">{l.flag}</span>
                    <span className={`flex-1 text-left font-medium ${dark ? 'text-slate-200' : 'text-gray-700'}`}>{l.name}</span>
                    {language === l.code && (<div className="w-6 h-6 rounded-full bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center"><Check size={14} className="text-white" strokeWidth={3} /></div>)}
                  </button>
                ))}
              </div>
            </div>

            <div className={`${cardBg} backdrop-blur rounded-3xl p-6 border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/20' : 'border-white/60'} shadow-sm text-center`}>
              <Logo size={64} />
              <h3 className={`font-bold ${headingText} mt-3 text-lg`}>merkavo</h3>
              <p className={`${subText} text-sm mt-1`}>{t('tagline')}</p>
              <div className={`mt-3 inline-block px-3 py-0.5 rounded-full text-[10px] font-bold tracking-wider uppercase ${dark ? 'bg-emerald-500/20 text-emerald-400' : 'bg-emerald-100 text-emerald-600'}`}>beta</div>
              <p className={`${subText} text-xs mt-4`}>{t('createdBy')} <span className="font-semibold bg-gradient-to-r from-green-400 via-emerald-400 to-lime-400 bg-clip-text text-transparent">Fez&Fez</span></p>
            </div>
          </div>
        )}
      </main>

      {showAddModal && (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-5 bg-black/50 backdrop-blur-sm" onClick={() => setShowAddModal(false)}>
          <div className={`modal-in w-full max-w-md ${dark ? 'bg-slate-900 border-slate-700' : 'bg-white border-white'} rounded-t-3xl sm:rounded-3xl border shadow-2xl p-6`} onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h3 className={`text-lg font-bold ${headingText} flex items-center gap-2`}>
                <Star size={20} className="text-amber-400" /> {t('addProduct')}
              </h3>
              <button onClick={() => setShowAddModal(false)} className={`p-1.5 rounded-full ${dark ? 'hover:bg-slate-800 text-slate-400' : 'hover:bg-gray-100 text-gray-500'}`}>
                <X size={20} />
              </button>
            </div>

            <div className={`mb-5 p-5 rounded-2xl bg-gradient-to-br ${dark ? 'from-amber-500/20 to-orange-500/20' : 'from-amber-100 to-orange-100'} text-center`}>
              <div className="text-5xl mb-2">{newEmoji || '⭐'}</div>
              <div className={`font-medium ${headingText}`}>{newName || '...'}</div>
            </div>

            <label className={`block text-xs font-semibold ${subText} mb-2 uppercase tracking-wide`}>{t('productName')}</label>
            <input type="text" value={newName} onChange={(e) => setNewName(e.target.value)} autoFocus className={`w-full px-4 py-3 rounded-2xl border-2 ${inputBg} outline-none focus:border-emerald-400 transition-colors mb-5`} placeholder="..." maxLength={30} />

            <label className={`block text-xs font-semibold ${subText} mb-2 uppercase tracking-wide`}>{t('chooseEmoji')}</label>
            <div className={`grid grid-cols-9 gap-1.5 mb-3 p-3 rounded-2xl ${dark ? 'bg-slate-800/50' : 'bg-gray-50'} max-h-40 overflow-y-auto`}>
              {SUGGESTED_EMOJIS.map(em => (
                <button key={em} onClick={() => setNewEmoji(em)} className={`text-2xl p-1 rounded-lg transition-all ${newEmoji === em ? (dark ? 'bg-slate-700 ring-2 ring-emerald-400' : 'bg-white ring-2 ring-green-400 shadow-sm') : (dark ? 'hover:bg-slate-700' : 'hover:bg-white')}`}>{em}</button>
              ))}
            </div>

            <label className={`block text-xs font-semibold ${subText} mb-2 uppercase tracking-wide`}>{t('customEmoji')}</label>
            <input type="text" value={newEmoji} onChange={(e) => setNewEmoji(e.target.value)} className={`w-full px-4 py-3 rounded-2xl border-2 ${inputBg} outline-none focus:border-emerald-400 transition-colors mb-5 text-center text-2xl`} maxLength={4} />

            <div className="flex gap-3">
              <button onClick={() => setShowAddModal(false)} className={`flex-1 py-3 rounded-2xl font-medium transition-all ${dark ? 'bg-slate-800 hover:bg-slate-700 text-slate-300' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}`}>{t('cancel')}</button>
              <button onClick={addCustomProduct} disabled={!newName.trim()} className="flex-1 py-3 rounded-2xl font-medium bg-gradient-to-r from-amber-400 to-orange-400 text-white shadow-md hover:shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed">{t('save')}</button>
            </div>
          </div>
        </div>
      )}

      {view === 'catalog' && totalSelected > 0 && !searchQuery && (
        <button onClick={() => setView('list')} className="fixed bottom-6 right-6 bg-gradient-to-br from-rose-400 to-pink-500 text-white rounded-full shadow-xl hover:shadow-2xl transition-all hover:scale-105 flex items-center gap-2 px-5 py-3.5 z-30">
          <ShoppingCart size={20} />
          <span className="font-semibold">{t('viewList')}</span>
          <span className="bg-white text-rose-500 text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">{totalSelected}</span>
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MerKavo />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
    });
  }
</script>
</body>
</html>
