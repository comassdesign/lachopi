// Storage seguro: usa localStorage si está disponible, si no usa memoria
const memStore = {};
const safeStorage = {
  get(key) {
    try { return localStorage.getItem(key); } catch { return memStore[key] || null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, value); } catch { memStore[key] = value; }
  }
};

function LaChopi() {
  const [selected, setSelected] = useState(() => { try { return JSON.parse(safeStorage.get('selected') || '{}'); } catch { return {}; } });
  const [purchased, setPurchased] = useState(() => { try { return JSON.parse(safeStorage.get('purchased') || '{}'); } catch { return {}; } });
  const [activeCategory, setActiveCategory] = useState('frutas');
  const [activeSubcategory, setActiveSubcategory] = useState('frutas');
  const [view, setView] = useState('catalog');
  const [animating, setAnimating] = useState(null);
  const [dark, setDark] = useState(() => { try { return JSON.parse(safeStorage.get('dark') || 'false'); } catch { return false; } });

  useEffect(() => { safeStorage.set('selected', JSON.stringify(selected)); }, [selected]);
  useEffect(() => { safeStorage.set('purchased', JSON.stringify(purchased)); }, [purchased]);
  useEffect(() => { safeStorage.set('dark', JSON.stringify(dark)); }, [dark]);

  const changeCategory = (key) => {
    setActiveCategory(key);
    setActiveSubcategory(Object.keys(CATEGORIES[key].subcategories)[0]);
  };

  const toggleItem = (id) => {
    setAnimating(id);
    setTimeout(() => setAnimating(null), 400);
    setSelected(p => { const n = {...p}; n[id] ? delete n[id] : n[id] = true; return n; });
  };
  const togglePurchased = (id) => setPurchased(p => { const n = {...p}; n[id] ? delete n[id] : n[id] = true; return n; });
  const removeFromList = (id) => {
    setSelected(p => { const n = {...p}; delete n[id]; return n; });
    setPurchased(p => { const n = {...p}; delete n[id]; return n; });
  };
  const clearList = () => { setSelected({}); setPurchased({}); };

  const totalSelected = Object.keys(selected).length;
  const totalPurchased = Object.keys(purchased).filter(id => selected[id]).length;

  const countCategorySelected = (cat) => Object.values(cat.subcategories).reduce((acc, sub) => acc + sub.items.filter(item => selected[item.id]).length, 0);
  const countSubSelected = (sub) => sub.items.filter(item => selected[item.id]).length;

  const selectedItemsByCategory = Object.entries(CATEGORIES).map(([catKey, cat]) => {
    const items = [];
    Object.values(cat.subcategories).forEach(sub => sub.items.forEach(item => { if (selected[item.id]) items.push(item); }));
    return { catKey, cat, items };
  }).filter(g => g.items.length > 0);

  const currentCategory = CATEGORIES[activeCategory];
  const currentSub = currentCategory.subcategories[activeSubcategory] || Object.values(currentCategory.subcategories)[0];

  const bgMain = dark ? 'bg-slate-950' : 'bg-gradient-to-br from-green-50 via-yellow-50 to-orange-50';
  const headerBg = dark ? 'bg-slate-900/80 border-slate-800' : 'bg-white/70 border-white/50';
  const cardBg = dark ? 'bg-slate-800/70' : 'bg-white/70';
  const tabInactive = dark ? 'bg-slate-800/70 text-slate-300 hover:bg-slate-700 border-slate-700/50' : 'bg-white/60 text-gray-600 hover:bg-white border-transparent';
  const itemBg = dark ? 'bg-slate-800/80 hover:bg-slate-700/80 border-slate-700/50' : 'bg-white/70 hover:bg-white border-transparent';
  const itemSelectedBg = dark ? 'bg-slate-700 ring-2 ring-emerald-400' : 'bg-white ring-2 ring-green-300';
  const itemNameText = dark ? 'text-slate-200' : 'text-gray-600';
  const itemNameSelectedText = dark ? 'text-white' : 'text-gray-700';
  const headingText = dark ? 'text-slate-100' : 'text-gray-700';
  const subText = dark ? 'text-slate-400' : 'text-gray-500';
  const listItemBg = dark ? 'bg-slate-800/90' : 'bg-white/80';

  return (
    <div className={`min-h-screen ${bgMain} pb-24 transition-colors duration-300 relative`}>
      {dark && (<>
        <div className="fixed top-0 left-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none" />
        <div className="fixed bottom-0 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl pointer-events-none" />
      </>)}

      <header className={`sticky top-0 z-20 backdrop-blur-xl ${headerBg} border-b transition-colors duration-300`}>
        <div className="max-w-3xl mx-auto px-5 py-4 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3 min-w-0">
            <Logo size={44} />
            <div className="min-w-0">
              <h1 className="text-2xl font-bold bg-gradient-to-r from-green-400 via-emerald-400 to-lime-400 bg-clip-text text-transparent leading-none">LaChopi</h1>
              <p className={`text-xs ${subText} mt-0.5 flex items-center gap-1`}><Sparkles size={10} /> Tu lista a un toque</p>
            </div>
          </div>
          <div className="flex gap-2 items-center flex-shrink-0">
            <button onClick={() => setDark(!dark)} className={`p-2 rounded-full transition-all ${dark ? 'bg-slate-800 text-amber-300 hover:bg-slate-700 border border-slate-700' : 'bg-white/60 text-slate-600 hover:bg-white border border-transparent'}`}>
              {dark ? <Sun size={18} /> : <Moon size={18} />}
            </button>
            <button onClick={() => setView('catalog')} className={`px-3 sm:px-4 py-2 rounded-full text-sm font-medium transition-all ${view === 'catalog' ? 'bg-gradient-to-r from-green-400 to-emerald-400 text-white shadow-md' : `${tabInactive} border`}`}>Catálogo</button>
            <button onClick={() => setView('list')} className={`px-3 sm:px-4 py-2 rounded-full text-sm font-medium transition-all relative ${view === 'list' ? 'bg-gradient-to-r from-rose-400 to-pink-400 text-white shadow-md' : `${tabInactive} border`}`}>
              Lista
              {totalSelected > 0 && (<span className={`absolute -top-1 -right-1 ${view === 'list' ? 'bg-white text-rose-500' : 'bg-rose-400 text-white'} text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shadow-sm`}>{totalSelected}</span>)}
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-5 pt-6 relative z-10">
        {view === 'catalog' && (
          <div className="slide-up">
            <div className="flex flex-wrap gap-2 mb-5">
              {Object.entries(CATEGORIES).map(([key, cat]) => {
                const count = countCategorySelected(cat);
                const isActive = activeCategory === key;
                const gradient = dark ? cat.gradientDark : cat.gradient;
                return (
                  <button key={key} onClick={() => changeCategory(key)} className={`relative px-3.5 py-2 rounded-2xl text-xs font-medium transition-all flex items-center gap-1.5 border ${isActive ? `bg-gradient-to-br ${gradient} ${dark ? 'text-slate-100 border-slate-600 shadow-lg shadow-black/20' : 'text-gray-800 border-white shadow-md'} scale-105` : tabInactive}`}>
                    <span className="text-sm">{cat.emoji}</span>{cat.name}
                    {count > 0 && (<span className="ml-1 bg-gradient-to-br from-green-400 to-emerald-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1">{count}</span>)}
                  </button>
                );
              })}
            </div>

            <div className={`bg-gradient-to-br ${dark ? currentCategory.gradientDark : currentCategory.gradient} rounded-3xl p-5 shadow-sm border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/30' : 'border-white/60'}`}>
              <h2 className={`text-lg font-bold ${headingText} mb-4 flex items-center gap-2`}>
                <span className="text-2xl">{currentCategory.emoji}</span>{currentCategory.name}
              </h2>

              <div className="flex flex-wrap gap-1.5 mb-5">
                {Object.entries(currentCategory.subcategories).map(([subKey, sub]) => {
                  const isActive = activeSubcategory === subKey;
                  const subCount = countSubSelected(sub);
                  return (
                    <button key={subKey} onClick={() => setActiveSubcategory(subKey)} className={`px-3 py-1.5 rounded-xl text-xs font-medium transition-all flex items-center gap-1 ${isActive ? (dark ? 'bg-slate-900/80 text-white shadow-md' : 'bg-white text-gray-800 shadow-md') : (dark ? 'bg-slate-900/40 text-slate-300 hover:bg-slate-900/60' : 'bg-white/50 text-gray-600 hover:bg-white/80')}`}>
                      <span>{sub.emoji}</span>{sub.name}
                      {subCount > 0 && (<span className="ml-0.5 bg-gradient-to-br from-green-400 to-emerald-500 text-white text-[9px] font-bold rounded-full min-w-[16px] h-[16px] flex items-center justify-center px-1">{subCount}</span>)}
                    </button>
                  );
                })}
              </div>

              <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 fade-in" key={activeSubcategory}>
                {currentSub.items.map(item => {
                  const isSelected = selected[item.id];
                  return (
                    <button key={item.id} onClick={() => toggleItem(item.id)} className={`relative group p-4 rounded-2xl transition-all duration-200 border ${isSelected ? `${itemSelectedBg} shadow-md scale-95` : `${itemBg} hover:shadow-sm hover:-translate-y-0.5`} ${animating === item.id ? 'pop' : ''}`}>
                      {isSelected && (<div className="absolute top-2 right-2 w-5 h-5 rounded-full bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center shadow-sm"><Check size={12} className="text-white" strokeWidth={3} /></div>)}
                      <div className="text-3xl mb-1">{item.emoji}</div>
                      <div className={`text-xs font-medium ${isSelected ? itemNameSelectedText : itemNameText}`}>{item.name}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {view === 'list' && (
          <div className="slide-up">
            {totalSelected === 0 ? (
              <div className="text-center py-20">
                <div className={`inline-block p-6 rounded-3xl ${cardBg} mb-4 border ${dark ? 'border-slate-700/60' : 'border-white/60'}`}>
                  <ShoppingCart size={48} className={dark ? 'text-slate-600' : 'text-gray-300'} />
                </div>
                <h3 className={`text-xl font-bold ${headingText} mb-2`}>Tu lista está vacía</h3>
                <p className={`${subText} text-sm mb-6`}>Añade productos desde el catálogo</p>
                <button onClick={() => setView('catalog')} className="px-6 py-3 bg-gradient-to-r from-green-400 to-emerald-400 text-white rounded-full font-medium shadow-md hover:shadow-lg transition-all flex items-center gap-2 mx-auto">
                  <Plus size={18} /> Empezar a añadir
                </button>
              </div>
            ) : (
              <>
                <div className={`${cardBg} backdrop-blur rounded-3xl p-5 mb-5 border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/20' : 'border-white/60'} shadow-sm`}>
                  <div className="flex items-center justify-between mb-3">
                    <div>
                      <div className="text-3xl font-bold bg-gradient-to-r from-rose-400 to-pink-400 bg-clip-text text-transparent">{totalSelected - totalPurchased}</div>
                      <div className={`text-xs ${subText}`}>por comprar</div>
                    </div>
                    <div className="text-right">
                      <div className="text-3xl font-bold text-emerald-400">{totalPurchased}</div>
                      <div className={`text-xs ${subText}`}>en el carro</div>
                    </div>
                  </div>
                  <div className={`w-full h-2 ${dark ? 'bg-slate-700' : 'bg-gray-100'} rounded-full overflow-hidden`}>
                    <div className="h-full bg-gradient-to-r from-green-400 to-emerald-400 transition-all duration-500" style={{ width: `${(totalPurchased / totalSelected) * 100}%` }} />
                  </div>
                </div>

                <div className="space-y-4">
                  {selectedItemsByCategory.map(({ catKey, cat, items }) => (
                    <div key={catKey} className={`bg-gradient-to-br ${dark ? cat.gradientDark : cat.gradient} rounded-3xl p-4 border ${dark ? 'border-slate-700/60 shadow-lg shadow-black/20' : 'border-white/60'} shadow-sm fade-in`}>
                      <div className="flex items-center gap-2 mb-3 px-1">
                        <span className="text-xl">{cat.emoji}</span>
                        <h3 className={`font-bold ${headingText} text-sm`}>{cat.name}</h3>
                        <span className={`text-xs ${subText} ${dark ? 'bg-slate-900/60' : 'bg-white/60'} px-2 py-0.5 rounded-full ml-auto`}>{items.length}</span>
                      </div>
                      <div className="space-y-2">
                        {items.map(item => {
                          const isPurchased = purchased[item.id];
                          return (
                            <div key={item.id} className={`flex items-center gap-3 ${listItemBg} backdrop-blur rounded-2xl p-3 transition-all border ${dark ? 'border-slate-700/40' : 'border-transparent'} ${isPurchased ? 'opacity-50' : ''}`}>
                              <button onClick={() => togglePurchased(item.id)} className={`w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center transition-all ${isPurchased ? 'bg-gradient-to-br from-green-400 to-emerald-500 shadow-sm' : `border-2 ${dark ? 'border-slate-500' : 'border-gray-300'} hover:border-green-400`}`}>
                                {isPurchased && <Check size={14} className="text-white" strokeWidth={3} />}
                              </button>
                              <span className="text-2xl">{item.emoji}</span>
                              <span className={`flex-1 text-sm font-medium ${isPurchased ? `line-through ${dark ? 'text-slate-500' : 'text-gray-400'}` : (dark ? 'text-slate-100' : 'text-gray-700')}`}>{item.name}</span>
                              <button onClick={() => removeFromList(item.id)} className={`${dark ? 'text-slate-500 hover:text-rose-400' : 'text-gray-300 hover:text-rose-400'} transition-colors p-1`}><Trash2 size={16} /></button>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="mt-6 flex justify-center">
                  <button onClick={clearList} className={`px-5 py-2.5 ${dark ? 'bg-slate-800/80 hover:bg-slate-800 border-rose-900/40 text-rose-400' : 'bg-white/60 hover:bg-white border-rose-100 text-rose-500'} text-sm font-medium rounded-full border transition-all flex items-center gap-2`}>
                    <Trash2 size={14} /> Vaciar lista
                  </button>
                </div>
              </>
            )}
          </div>
        )}
      </main>

      {view === 'catalog' && totalSelected > 0 && (
        <button onClick={() => setView('list')} className="fixed bottom-6 right-6 bg-gradient-to-br from-rose-400 to-pink-500 text-white rounded-full shadow-xl hover:shadow-2xl transition-all hover:scale-105 flex items-center gap-2 px-5 py-3.5 z-30">
          <ShoppingCart size={20} />
          <span className="font-semibold">Ver lista</span>
          <span className="bg-white text-rose-500 text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">{totalSelected}</span>
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LaChopi />);
</script>
<script>
  // Registro del Service Worker para funcionar offline
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
    });
  }
</script>
</body>
</html>
